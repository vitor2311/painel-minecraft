name: Build EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller psutil

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "PainelMinecraft" painel_minecraft.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PainelMinecraft-exe
          path: dist/PainelMinecraft.exe
